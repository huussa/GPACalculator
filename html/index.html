<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A simple GPA calculator to help students calculate their Grade Point Average based on their course grades and credit hours.">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/media.css">
    <link rel="icon" href="../images/GPACalculator.png" type="image/x-icon">
    <title>GPA Calculator</title>
    <style>
    </style>
</head>
<body>
    <h1>GPA Calculator</h1>
    <div class="system-of-grades">
        <h3>System of Grades</h3>

        <select>
            <option value="4" selected>4</option>
            <option value="5">5</option>
        </select>
    </div>
    <div class="subject">
        <div class="input-group subject-name">
            <h3>subject name:</h3>
            <input type="text" placeholder="Enter subject name">
        </div>
        <div class="input-group hours">
            <h3>Hours:</h3>
            <select id="hours" >
                <option value="" selected>Choose hours</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
                <option value="10">10</option>
            </select>
        </div>
        <div class="input-group grade">
            <h3>Grade:</h3>
            <select id="grade" >
                <option value="" selected>Choose Grade</option>
                <option value="4.00">A+</option>
                <option value="3.75">A</option>
                <option value="3.50">B+</option>
                <option value="3.00">B</option>
                <option value="2.50">C+</option>
                <option value="2.00">C</option>
                <option value="1.50">D+</option>
                <option value="1.00">D</option>
                <option value="0.00">F</option>
            </select>
        </div>
        <div class="show-result-btn">
            <button type="button">Show Result</button>
        </div>
        <div class="add-clear">
            <button type="button">Add Subject</button>
            <button type="button">Clear</button>
        </div>
        <div class="result">
            <p>GPA: <span id="gpa">0.00</span></p>
        </div>
    </div>
</body>
</html>
